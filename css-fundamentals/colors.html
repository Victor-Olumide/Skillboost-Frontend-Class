<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors</title>
    <style>

      /* color name */
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 20px;
        background-color: blue;
      }

      /* hex */
      h1 {
        color: #ffffff;
      }

      /* red,green,blue */
      p, ul {
        color: rgb(143, 206, 255);
      }

      /* red, green,blue, alpha */
      code {
        font-size: 15px;
        color: rgba(255, 219, 219, 0.729);
      }

      /* hue, saturation, lightness */
      li:first-of-type {
        color: hsl(65, 100%, 50%);
      }

      /* hue, saturation, lightness, alpha */
      li:nth-child(2) {
        color: hsla(120, 100%, 50%, 0.726);
      }
      /* hue, white, black */
      li:last-of-type{
        color: hwb(138 0% 0%);
      }

      /* h2{
        color: transparent;
        font-size: 200px;
      } */

      div{
        background-color:  red;
        background-image: url(./OIP.webp), url(https://tse3.mm.bing.net/th/id/OIP.MInViflWTn0CIsOU3esbLwHaE5?rs=1&pid=ImgDetMain&o=7&rm=3), url(https://images.pexels.com/photos/236047/pexels-photo-236047.jpeg?cs=srgb&dl=clouds-cloudy-countryside-236047.jpg&fm=jpg);
        background-repeat: repeat-x, repeat-y, no-repeat;
        background-position: left top, center, right bottom;
        background-size: 100px 100px, 100px 100px, contain;
        width: 100%;
        height: 1000px;
      }

      article{
        background-image: linear-gradient(to right, green 33.33%, white 33.33%, white 66.66%, green 66.66%);
        border: 10px solid black;
        width: 500px;
        height: 400px;
      }
      aside {
        background-image: radial-gradient(red 33.33%, white 33.33%,);
        border: 10px solid black;
        width: 500px;
        height: 500px;
      }

      section {
        background-image: conic-gradient(red 0% 25%, white 25% 50%, green 50% 75%, white 75%);
        border: 10px solid black;
        width: 500px;
        height: 500px;
      }


    </style>
  </head>
  <body>
    <h1>Colors</h1>
    <p>Colors can be specified in CSS using various formats, including:</p>
    <ul>
      <li>
        <strong>Hexadecimal:</strong> <code>#RRGGBB</code> or <code>#RGB</code>
      </li>
      <li><strong>RGB:</strong> <code>rgb(255, 0, 0)</code></li>
      <li><strong>RGBA:</strong> <code>rgba(255, 0, 0, 0.5)</code></li>
      <li><strong>HSL:</strong> <code>hsl(120, 100%, 50%)</code></li>
      <li><strong>HSLA:</strong> <code>hsla(120, 100%, 50%, 0.5)</code></li>
      <li>
        <strong>Named Colors:</strong> e.g., <code>red</code>,
        <code>blue</code>, etc.
      </li>
    </ul>

    <div>
        <h2>Hello World</h2>
    </div>
    <article></article>
    <aside></aside>
    <section></section>
    <nav></nav>
  </body>
</html>
